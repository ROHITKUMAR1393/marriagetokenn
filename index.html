<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भाग 2: दस्तावेज़ अपलोड एवं टोकन</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .upload-box { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #d9534f; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input[type="file"] { width: 100%; padding: 10px; background: #eee; border-radius: 4px; }
        .token-bill { display: none; margin-top: 25px; padding: 20px; border: 2px dashed #000; background: #fff; }
        .t-num { font-size: 20px; color: green; font-weight: bold; text-align: center; margin: 10px 0; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="upload-box">
    <h2>भाग 2: दस्तावेज़ अपलोड प्रणाली</h2>
    <form id="uploadForm">
        <label>वर का आधार कार्ड अपलोड करें:</label>
        <input type="file" required>

        <label>वधू का आधार कार्ड अपलोड करें:</label>
        <input type="file" required>

        <label>शादी का कार्ड / प्रमाण पत्र:</label>
        <input type="file" required>

        <button type="button" onclick="generateFinalToken()">दस्तावेज़ अपलोड करें और टोकन लें</button>
    </form>

    <!-- फाइनल टोकन रसीद जो बटन दबाते ही खुलेगी -->
    <div id="tokenBill" class="token-bill">
        <h3 style="text-align:center; margin:0;">मैरिज रजिस्ट्रेशन टोकन पावती</h3>
        <div class="t-num" id="tNumber">---</div>
        <p><strong>वर का नाम:</strong> <span id="lblGroom"></span></p>
        <p><strong>वधू का नाम:</strong> <span id="lblBride"></span></p>
        <p><strong>कार्यालय:</strong> <span id="lblSro"></span></p>
        <p><strong>स्थिति:</strong> <span style="color: green; font-weight:bold;">सफलतापूर्वक ड्राफ्ट सुरक्षित (टोकन जनरेटेड)</span></p>
        <button onclick="window.print()">इस रसीद को प्रिंट करें</button>
    </div>
</div>

<script>
    function generateFinalToken() {
        var form = document.getElementById('uploadForm');
        if(!form.checkValidity()) {
            alert("कृपया पहले सभी दस्तावेज़ चुनें।");
            return;
        }

        // पिछले पेज का डेटा ब्राउज़र मेमोरी से निकालना
        document.getElementById('lblGroom').innerText = localStorage.getItem('groom') || "N/A";
        document.getElementById('lblBride').innerText = localStorage.getItem('bride') || "N/A";
        document.getElementById('lblSro').innerText = localStorage.getItem('sro') || "N/A";

        // रैंडम टोकन नंबर बनाना
        var rand = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('tNumber').innerText = "टोकन नंबर: UP-MREG-" + rand;

        // रसीद दिखाना
        document.getElementById('tokenBill').style.setProperties ? document.getElementById('tokenBill').style.setProperty('display', 'block') : document.getElementById('tokenBill').style.display = 'block';
        alert("बधाई हो! टोकन सफलतापूर्वक जनरेट हो गया है।");
    }
</script>

</body>
</html>
